<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>交期資料分列</title>
    <style>
      :root {
        --bg: #f3efe6;
        --panel: #fffdf7;
        --ink: #1d2a32;
        --sub: #5e6b73;
        --accent: #1f6f78;
        --accent-2: #f2a65a;
        --line: #d7d2c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #fff8e8 0, transparent 30%),
          radial-gradient(circle at 90% 85%, #f5d4a8 0, transparent 25%),
          linear-gradient(135deg, #ece7dc, #f8f4eb 50%, #efe6d4);
        min-height: 100vh;
      }

      .wrap {
        width: min(1100px, 94vw);
        margin: 28px auto;
        padding: 18px;
      }

      .card {
        background: color-mix(in oklab, var(--panel) 92%, white 8%);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(29, 42, 50, 0.08);
        overflow: hidden;
      }

      .head {
        position: relative;
        padding: 20px;
        background: linear-gradient(90deg, var(--accent), #2f8a95 50%, #66b6be);
        color: white;
      }

      .head-auth {
        position: static;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .head-auth button {
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.15);
        color: #ffffff;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .head-auth button:disabled {
        opacity: 0.55;
      }

      .head h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2.4vw, 1.7rem);
      }

      .head p {
        margin: 8px 0 0;
        font-size: 0.95rem;
        opacity: 0.95;
      }

      .tools {
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }

      .page-switch {
        display: flex;
        gap: 10px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: #f8f2e5;
      }

      .page-switch button {
        background: #e4d7bc;
        color: #364147;
      }

      .page-switch button.active {
        background: #1f6f78;
        color: white;
      }

      .field {
        margin-bottom: 10px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: #3f4a50;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        border: 1px solid #c9c2b3;
        border-radius: 10px;
        padding: 10px 12px;
        font: 500 14px/1.4 "JetBrains Mono", "Consolas", monospace;
        color: #2d3a40;
        background: #fffefb;
      }

      .field select {
        width: 100%;
        border: 1px solid #c9c2b3;
        border-radius: 10px;
        padding: 10px 12px;
        font: 500 14px/1.4 "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: #2d3a40;
        background: #fffefb;
      }

      .th-sort {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .sort-toggle {
        border: 1px solid #9ab9bd;
        background: #e7f2f3;
        color: #24545a;
        border-radius: 8px;
        padding: 2px 8px;
        font-size: 0.8rem;
        font-weight: 700;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .sort-toggle:hover {
        background: #d4eaec;
        border-color: #7ca9ae;
      }

      .sort-toggle:active {
        background: #1f6f78;
        border-color: #1f6f78;
        color: #ffffff;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        border: 1px solid #c9c2b3;
        border-radius: 12px;
        padding: 12px;
        font: 500 14px/1.5 "JetBrains Mono", "Consolas", monospace;
        resize: vertical;
        color: #2d3a40;
        background: #fffefb;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .ghost {
        background: #e9dfca;
        color: #39464d;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 0.85rem;
        border-radius: 6px;
        margin-right: 6px;
        border: 0;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-edit {
        background: #66b6be;
        color: white;
      }

      .btn-edit:hover {
        background: #4a9da5;
      }

      .btn-delete {
        background: #c0392b;
        color: white;
      }

      .btn-delete:hover {
        background: #a03425;
      }

      .editable {
        background: #fffdf0;
        outline: none;
        min-width: 60px;
      }

      .editable:focus {
        box-shadow: 0 0 0 2px rgba(31,111,120,0.12);
      }

      .progress {
        position: relative;
        width: 120px;
        height: 14px;
        background: #f0f0f0;
        border-radius: 8px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #66b6be, #1f6f78);
        transition: width 0.2s ease;
      }

      .progress-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: #073b3f;
        font-weight: 700;
        text-shadow: 0 1px 0 rgba(255,255,255,0.4);
        pointer-events: none;
      }

      /* Color tiers for progress */
      .progress-bar.low {
        background: linear-gradient(90deg, #f06565, #e63946); /* red */
      }

      .progress-bar.mid {
        background: linear-gradient(90deg, #ffd700, #ffea6a); /* yellow */
      }

      .progress-bar.high {
        background: linear-gradient(90deg, #3b82f6, #2b6de0); /* blue */
      }

      .progress-bar.full {
        background: linear-gradient(90deg, #34d399, #10b981); /* green for 100% */
      }

      #status {
        color: var(--sub);
        font-size: 0.9rem;
      }

      #status.error {
        color: #c0392b;
        font-weight: 700;
      }
        #authStatus {
          color: #ffffff;
          font-size: 0.85rem;
          font-weight: 700;
          text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        #authDomainHint {
          color: rgba(255, 255, 255, 0.9);
          font-size: 0.78rem;
        }

      .table-wrap {
        padding: 20px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 680px;
      }

      thead th {
        text-align: left;
        background: #f0e8d8;
        color: #3f4a50;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
      }

      th,
      td {
        border: 1px solid var(--line);
        padding: 10px 12px;
      }

      tbody tr:nth-child(odd) {
        background: #fffef9;
      }

      tbody tr:nth-child(even) {
        background: #fbf7ee;
      }

      .qty {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .foot {
        padding: 0 20px 20px;
        color: #657179;
        font-size: 0.85rem;
      }

      .hidden {
        display: none;
      }

      .pager {
        padding: 0 20px 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .pager-info {
        color: #5e6b73;
        font-size: 0.9rem;
      }

      @media (max-width: 700px) {
        .wrap {
          width: 96vw;
          margin: 14px auto;
          padding: 8px;
        }

        .tools,
        .table-wrap,
        .foot {
          padding: 14px;
        }
      }
    </style>
  </head>

      function splitRecords(text) {
        const lines = text
          .replace(/\r/g, "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);

        const records = [];
        let bucket = [];

        for (const line of lines) {
          bucket.push(line);
          if (/\d{4}-\d{2}-\d{2}\s*$/.test(line)) {
            records.push(bucket.join(" "));
            bucket = [];
          }
        }

        if (bucket.length > 0) {
          records.push(bucket.join(" "));
        }

        return records;
      }

      function parseRecord(record) {
        const withoutVendorPattern = /^(\S+)\s+(.+?)\s+([\d,]+)\s+Each\s+[\d,]+\s+[\d,.]+\s+[\d,.]+\s+(\d{4}-\d{2}-\d{2})$/;
        const withoutVendor = record.match(withoutVendorPattern);
        if (!withoutVendor) return null;

        const partNo = withoutVendor[1];
        const beforeQty = withoutVendor[2].trim();
        const qty = Number(withoutVendor[3].replace(/,/g, ""));
        const dueDate = withoutVendor[4];
        const firstToken = beforeQty.split(/\s+/)[0] || "";
        const version = /^\d+$/.test(firstToken) ? firstToken : "?";

        return {
          partNo,
          version,
          qty,
          dueDate,
        };
      }

      function renderRows(rows) {

            <td class="qty">${row.qty.toLocaleString("en-US")}</td>
            <td>${row.dueDate}</td>
          `;
          tableBody.appendChild(tr);
        }
      }

      function formatTimestamp(value) {
        if (!value) return "-";
        if (typeof value.toDate === "function") {
          return value.toDate().toLocaleString("zh-TW", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          });
        }
        if (value instanceof Date) {
          return value.toLocaleString("zh-TW", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          });
        }
        return String(value);
      }

          totalQty += qtyVal;

          const percent = qtyVal > 0 ? Math.round((deliveredVal / qtyVal) * 100) : 0;
          let tier;
          if (percent === 100) tier = 'full';
          else if (percent >= 80) tier = 'high';
          else if (percent >= 50) tier = 'mid';
          else tier = 'low';
          tr.innerHTML = `
            <td>${row.vendorNo || "-"}</td>
            <td>${row.partNo || "-"}</td>
            <td>${row.version || "-"}</td>
            <td class="qty">${Number(qtyVal).toLocaleString("en-US")}</td>
            <td>${row.dueDate || "-"}</td>
            <td>${formatTimestamp(row.updatedAt)}</td>
            <td>
              <div class="progress" title="已交 ${deliveredVal} / ${qtyVal}">
                <div class="progress-bar ${tier}" style="width: ${Math.max(0, Math.min(100, percent))}%"></div>

              </div>
            </td>
            <td class="qty editable delivered" contenteditable="true" data-doc-id="${row.docId}" data-max="${row.qty || 0}">${Number(deliveredVal || 0).toLocaleString("en-US")}</td>
            <td>

          `;

          btn.addEventListener("click", async (e) => {
            const docId = e.target.getAttribute("data-doc-id");
            if (confirm("確定要刪除此訂單嗎？")) {
              await deleteOrderFromFirebase(docId);
            }
          });
        });

        // Inline editing for deliveredQty cells
        document.querySelectorAll('.editable.delivered').forEach((cell) => {
          // store original value
          cell.addEventListener('focus', (ev) => {
            cell.dataset.original = cell.textContent.replace(/,/g, '').trim();
          });

          cell.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter') {
              ev.preventDefault();
              cell.blur();
            }
            if (ev.key === 'Escape') {
              cell.textContent = cell.dataset.original;
              cell.blur();
            }
          });

          cell.addEventListener('blur', async (ev) => {
            const docId = cell.getAttribute('data-doc-id');
            const raw = cell.textContent.replace(/,/g, '').trim();
            const original = cell.dataset.original;
            if (raw === original) return;
            const val = Number(raw);
            const max = Number(cell.getAttribute('data-max') || 0);
            if (Number.isNaN(val) || val < 0 || val > max) {
              alert(`已交數量必須為數字且介於 0 到 ${max} 之間`);
              cell.textContent = Number(original || 0).toLocaleString('en-US');
              return;
            }

            try {
              await updateDoc(doc(db, COLLECTION_NAME, docId), {
                deliveredQty: Number(val),
                updatedAt: serverTimestamp(),
              });
              cell.textContent = Number(val).toLocaleString('en-US');
              queryStatusEl.textContent = '已更新已交數量';
              await loadOrdersFromFirebase();
              showQueryPage();
            } catch (error) {
              const friendly = getFriendlyFirebaseError(error);
              queryStatusEl.textContent = `更新失敗（${friendly.code}）：${friendly.detail}`;
              console.error('Inline update error', error);
              cell.textContent = Number(original || 0).toLocaleString('en-US');
            }
          });
        });
      }

      function getExportTitle() {
        return "查詢月份訂單";
      }

      function getFilteredSortedQueryRows() {
        const selectedMonth = queryMonthInput.value;
        const monthFilteredRows = selectedMonth
          ? queryRows.filter((row) => (row.dueDate || "").startsWith(selectedMonth))
          : queryRows;
        return sortByDueDate(monthFilteredRows, dueDateSortOrder);
      }

      function getExportRows() {
        const rows = getFilteredSortedQueryRows();
        return rows.map((row) => ({
          "vender no.": row.vendorNo || "",
          "產品料號": row.partNo || "",
          "版本": row.version || "",
          "數量": Number(row.qty || 0),
          "期望交期": row.dueDate || "",
        }));
      }

      async function getXlsxLib() {
        if (typeof XLSX !== "undefined") {
          return XLSX;
        }

        try {
          const module = await import("https://esm.run/xlsx@0.18.5");
          return module?.default || module;
        } catch (error) {
          console.error("XLSX 加載失敗", error);
          return null;
        }
      }

      async function exportToExcel() {
        const xlsx = await getXlsxLib();
        if (!xlsx || !xlsx.utils || typeof xlsx.utils.json_to_sheet !== "function") {
          queryStatusEl.textContent = "Excel 匯出功能暫時無法使用，請重整頁面後再試。";
          return;
        }

        const exportRows = getExportRows();
        if (exportRows.length === 0) {
          queryStatusEl.textContent = "目前沒有資料可匯出。";
          return;
        }

        try {
          const wb = xlsx.utils.book_new();
          const ws = xlsx.utils.json_to_sheet(exportRows);
          xlsx.utils.book_append_sheet(wb, ws, getExportTitle());
          const fileName = `${getExportTitle()}_${new Date().toISOString().slice(0, 10)}.xlsx`;
          xlsx.writeFile(wb, fileName);
          queryStatusEl.textContent = "Excel 已匯出。";
        } catch (error) {
          console.error("Excel 匯出錯誤", error);
          queryStatusEl.textContent = `Excel 匯出失敗：${error?.message || error}`;
        }
      }

      async function exportToPdf() {
        const exportRows = getExportRows();
        if (exportRows.length === 0) {
          queryStatusEl.textContent = "目前沒有資料可匯出。";
          return;
        }

        try {
          let jsPDFModule = null;
          if (window.jspdf && typeof window.jspdf.jsPDF !== "undefined") {
            jsPDFModule = window.jspdf;
          } else if (window.jsPDF) {
            jsPDFModule = { jsPDF: window.jsPDF };
          } else {
            jsPDFModule = await import("https://esm.run/jspdf@2.5.1");
          }

          if (!jsPDFModule || typeof jsPDFModule.jsPDF !== "function") {
            queryStatusEl.textContent = "PDF 匯出功能暫時無法使用，請重整頁面後再試。";
            return;
          }

          const { jsPDF } = jsPDFModule;
          const doc = new jsPDF({ unit: "pt", format: "a4" });
          const pageWidth = doc.internal.pageSize.getWidth();
          const pageHeight = doc.internal.pageSize.getHeight();
          const title = getExportTitle();
          const leftMargin = 40;
          const rightMargin = 40;
          const lineHeight = 18;
          const maxRowsPerPage = Math.floor((pageHeight - 100) / lineHeight) - 1;

          doc.setFontSize(14);
          doc.text(title, pageWidth / 2, 40, { align: "center" });
          doc.setFontSize(10);

          const headers = ["vender no.", "產品料號", "版本", "數量", "期望交期"];
          const positions = [leftMargin, leftMargin + 120, leftMargin + 260, leftMargin + 330, leftMargin + 390];
          let cursorY = 70;

          headers.forEach((text, index) => doc.text(text, positions[index], cursorY));
          cursorY += lineHeight;
          doc.setLineWidth(0.5);
          doc.line(leftMargin, cursorY - 8, pageWidth - rightMargin, cursorY - 8);

          for (let i = 0; i < exportRows.length; i += 1) {
            if (i > 0 && i % maxRowsPerPage === 0) {
              doc.addPage();
              cursorY = 50;
              headers.forEach((text, index) => doc.text(text, positions[index], cursorY));
              cursorY += lineHeight;
              doc.line(leftMargin, cursorY - 8, pageWidth - rightMargin, cursorY - 8);
            }

            const row = exportRows[i];
            const values = [row["vender no."], row["產品料號"], row["版本"], String(row["數量"]), row["期望交期"]];
            values.forEach((text, index) => doc.text(text || "", positions[index], cursorY));
            cursorY += lineHeight;
          }

          const fileName = `訂單查詢_${new Date().toISOString().slice(0, 10)}.pdf`;
          doc.save(fileName);
          queryStatusEl.textContent = "PDF 已匯出。";
        } catch (error) {
          console.error("PDF 匯出錯誤", error);
          queryStatusEl.textContent = `PDF 匯出失敗：${error?.message || error}`;
        }
      }

      function sortByDueDate(rows, order) {
        return [...rows].sort((a, b) => {
          const aDate = Date.parse(a.dueDate || "");
          const bDate = Date.parse(b.dueDate || "");

          if (Number.isNaN(aDate) && Number.isNaN(bDate)) return 0;
          if (Number.isNaN(aDate)) return 1;
          if (Number.isNaN(bDate)) return -1;
          return order === "desc" ? bDate - aDate : aDate - bDate;
        });
      }

      function renderQueryPager(totalRows) {
        const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
        currentPage = Math.min(currentPage, totalPages);

        prevPageBtn.disabled = currentPage <= 1;
        nextPageBtn.disabled = currentPage >= totalPages;
        pageInfo.textContent = `第 ${currentPage} / ${totalPages} 頁，共 ${totalRows} 筆`;
        queryPager.classList.remove("hidden");
      }

      function applyQueryView() {
        const selectedMonth = queryMonthInput.value;
        const monthFilteredRows = selectedMonth
          ? queryRows.filter((row) => (row.dueDate || "").startsWith(selectedMonth))
          : queryRows;
        const sortedRows = sortByDueDate(monthFilteredRows, dueDateSortOrder);
        const start = (currentPage - 1) * PAGE_SIZE;
        const pagedRows = sortedRows.slice(start, start + PAGE_SIZE);
        renderQueryRows(pagedRows);
        renderQueryPager(sortedRows.length);
      }

      function showParsePage() {
        parsePage.classList.remove("hidden");
        parseTableSection.classList.remove("hidden");
        queryPage.classList.add("hidden");
        queryTableSection.classList.add("hidden");
        queryPager.classList.add("hidden");
        parsePageBtn.classList.add("active");
        queryPageBtn.classList.remove("active");
        localStorage.setItem("currentPage", "parse");
      }

      function showQueryPage() {
        queryPage.classList.remove("hidden");
        queryTableSection.classList.remove("hidden");
        parsePage.classList.add("hidden");
        parseTableSection.classList.add("hidden");
        queryPageBtn.classList.add("active");
        parsePageBtn.classList.remove("active");
        localStorage.setItem("currentPage", "query");
      }

      function parseAndRender() {
        const vendorNo = vendorNoInput.value.trim();
        const input = rawInput.value.trim();
        if (!vendorNo || !input) {
          tableBody.innerHTML = "";
          parsedRows = [];
          setStatus("需輸入資料");
          return;
        }

        const records = splitRecords(input);
        const rows = records
          .map(parseRecord)
          .filter(Boolean)
          .map((row) => ({
            vendorNo,
            ...row,
          }));
        parsedRows = rows;
        renderRows(rows);

        const skipped = records.length - rows.length;
        setStatus(`已解析 ${rows.length} 筆資料` + (skipped > 0 ? `，略過 ${skipped} 筆格式不符資料` : ""));
      }

      function getFriendlyFirebaseError(error) {
        const code = error?.code || "unknown";
        const map = {
          "permission-denied": "權限不足：請到 Firestore Rules 開放寫入，或先完成登入驗證。",
          "failed-precondition": "前置條件不符：請確認 Firestore Database 已建立（非 Realtime Database）。",
          unavailable: "服務暫時不可用：請檢查網路後再試。",
          unauthenticated: "尚未驗證：目前規則可能要求登入後才能寫入。",
        };

        return {
          code,
          detail: map[code] || error?.message || "未知錯誤",
        };
      }

      function getFriendlyAuthError(error) {
        const code = error?.code || "unknown";
        const map = {
          "auth/popup-blocked": "瀏覽器擋住登入彈窗，已改用跳轉登入。",
          "auth/popup-closed-by-user": "登入視窗被關閉，請再試一次。",
          "auth/operation-not-allowed": "尚未在 Firebase Authentication 啟用 Google 登入。",
          "auth/unauthorized-domain": "目前網域未加入 Firebase Authentication 的 Authorized domains。",
        };
        return map[code] || error?.message || "登入失敗，請檢查 Firebase Auth 設定。";
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function updateAuthDomainHint() {
        const host = window.location.host || "(unknown)";
        authDomainHintEl.textContent = `目前網域：${host}`;
      }

      function resetInputs() {
        vendorNoInput.value = "";
        rawInput.value = "";
        queryVendorNoInput.value = "";
        queryPartNoInput.value = "";
        queryMonthInput.value = "";
      }

        function updateAuthUI() {
          const loggedIn = Boolean(currentUser);
          loginBtn.disabled = loggedIn;
          logoutBtn.disabled = !loggedIn;
          authStatusEl.textContent = loggedIn
            ? `已登入：${currentUser.displayName || currentUser.email || "使用者"}`
            : "未登入";
        }

      async function saveParsedRowsToFirebase() {
        if (!db) {
          setStatus("Firebase 尚未設定，請先填入 FIREBASE_CONFIG。");
          return;
        }

        if (parsedRows.length === 0) {
          setStatus("目前沒有可儲存資料，請先解析。");
          return;
        }

        const vendorNo = parsedRows[0].vendorNo;
        if (!vendorNo) {
          setStatus("需輸入資料");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = "儲存中...";

        try {
          const duplicateQuery = query(
            collection(db, COLLECTION_NAME),
            where("vendorNo", "==", vendorNo),
            limit(1)
          );
          const existing = await getDocs(duplicateQuery);
          if (!existing.empty) {
            setStatus("已重複輸入", true);
            return;
          }

          const writeJobs = parsedRows.map((row) =>
            addDoc(collection(db, COLLECTION_NAME), {
              ...row,
              deliveredQty: 0,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp(),
            })
          );

          const docs = await Promise.all(writeJobs);
          setStatus(`已成功存入 Firebase：${parsedRows.length} 筆（專案 ${FIREBASE_CONFIG.projectId} / collection ${COLLECTION_NAME}）`);
          console.info("Firestore write success", docs.map((d) => d.id));
        } catch (error) {
          const friendly = getFriendlyFirebaseError(error);
          setStatus(`Firebase 寫入失敗（${friendly.code}）：${friendly.detail}`);
          console.error("Firestore write error", error);
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "存進 Firebase";
        }
      }

      async function deleteOrderFromFirebase(docId) {
        if (!db) {
          queryStatusEl.textContent = "Firebase 尚未設定";
          return;
        }

        try {
          await deleteDoc(doc(db, COLLECTION_NAME, docId));
          queryStatusEl.textContent = "已刪除訂單";
          await loadOrdersFromFirebase();
          showQueryPage();
        } catch (error) {
          const friendly = getFriendlyFirebaseError(error);
          queryStatusEl.textContent = `刪除失敗（${friendly.code}）：${friendly.detail}`;
          console.error("Delete error", error);
        }
      }

      async function editOrderModal(row, docId) {
        // 只允許修改已交數量
        const maxQty = Number(row.qty || 0);
        let deliveredDefault = typeof row.deliveredQty !== 'undefined' ? row.deliveredQty : 0;
        let newDelivered;
        while (true) {
          const input = prompt(`已交數量（數字，且 >=0 且 <= ${maxQty}）`, String(deliveredDefault));
          if (input === null) return;
          newDelivered = Number(input);
          if (Number.isNaN(newDelivered) || newDelivered < 0 || newDelivered > maxQty) {
            alert(`已交數量必須為數字且介於 0 到 ${maxQty} 之間`);
            continue;
          }
          break;
        }

        try {
          await updateDoc(doc(db, COLLECTION_NAME, docId), {
            deliveredQty: Number(newDelivered),
            updatedAt: serverTimestamp(),
          });
          queryStatusEl.textContent = "已更新已交數量";
          await loadOrdersFromFirebase();
          showQueryPage();
        } catch (error) {
          const friendly = getFriendlyFirebaseError(error);
          queryStatusEl.textContent = `更新失敗（${friendly.code}）：${friendly.detail}`;
          console.error("Update error", error);
        }
      }

      async function loadOrdersFromFirebase() {
        if (!db) {
          queryStatusEl.textContent = "Firebase 尚未設定，請先填入 FIREBASE_CONFIG。";
          return;
        }

        const queryVendorNo = queryVendorNoInput.value.trim();
        const queryPartNo = queryPartNoInput.value.trim();

        loadOrdersBtn.disabled = true;
        loadOrdersBtn.textContent = "載入中...";

        try {
          const baseCollection = collection(db, COLLECTION_NAME);
          let source;

          if (queryVendorNo) {
            // 優先按 vender no. 查詢
            source = query(baseCollection, where("vendorNo", "==", queryVendorNo));
          } else if (queryPartNo) {
            // 如果沒有 vender no.，按產品料號查詢
            source = query(baseCollection, where("partNo", "==", queryPartNo));
          } else {
            // 都沒有則加載全部
            source = baseCollection;
          }

          const snapshot = await getDocs(source);
          queryRows = snapshot.docs.map((doc) => ({
            docId: doc.id,
            ...doc.data(),
          }));
          currentPage = 1;
          applyQueryView();
          showQueryPage();
          
          const selectedMonth = queryMonthInput.value;
          const afterMonthFilter = selectedMonth
            ? queryRows.filter((row) => (row.dueDate || "").startsWith(selectedMonth)).length
            : queryRows.length;

          if (queryVendorNo) {
            queryStatusEl.textContent = `vender no. ${queryVendorNo} 查詢結果：${afterMonthFilter} 筆`;
          } else if (queryPartNo) {
            queryStatusEl.textContent = `產品料號 ${queryPartNo} 查詢結果：${afterMonthFilter} 筆`;
          } else {
            queryStatusEl.textContent = `已載入 ${afterMonthFilter} 筆資料`;
          }
        } catch (error) {
          const friendly = getFriendlyFirebaseError(error);
          queryStatusEl.textContent = `讀取失敗（${friendly.code}）：${friendly.detail}`;
        } finally {
          loadOrdersBtn.disabled = false;
          loadOrdersBtn.textContent = "查詢訂單";
        }
      }

      parseBtn.addEventListener("click", parseAndRender);
      saveBtn.addEventListener("click", saveParsedRowsToFirebase);
      loginBtn.addEventListener("click", async () => {
        if (!auth) {
          setStatus("Firebase 尚未設定，無法登入。", true);
          return;
        }

        if (window.location.protocol === "file:") {
          setStatus("請改用 http 網址開啟（例如 http://localhost:5500），file:// 無法使用 Firebase 登入。", true);
          return;
        }

        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
          setStatus("登入成功，可存進 Firebase。");
        } catch (error) {
          if (error?.code === "auth/popup-blocked") {
            try {
              const provider = new GoogleAuthProvider();
              await signInWithRedirect(auth, provider);
              return;
            } catch (redirectError) {
              setStatus(`登入失敗：${getFriendlyAuthError(redirectError)}`, true);
              return;
            }
          }

          setStatus(`登入失敗（${error?.code || "unknown"}）：${getFriendlyAuthError(error)}`, true);
        }
      });
        logoutBtn.addEventListener("click", async () => {
          if (!auth) return;
          try {
            await firebaseSignOut(auth);
            setStatus("已登出。", false);
          } catch (error) {
            setStatus(`登出失敗：${error.message}`, true);
          }
        });
      parsePageBtn.addEventListener("click", showParsePage);
      queryPageBtn.addEventListener("click", () => {
        showQueryPage();
        loadOrdersFromFirebase();
      });
      loadOrdersBtn.addEventListener("click", loadOrdersFromFirebase);
      exportExcelBtn.addEventListener("click", exportToExcel);
      exportPdfBtn.addEventListener("click", exportToPdf);
      dueDateSortBtn.addEventListener("click", () => {
        dueDateSortOrder = dueDateSortOrder === "asc" ? "desc" : "asc";
        dueDateSortBtn.textContent = dueDateSortOrder === "asc" ? "近→遠" : "遠→近";
        currentPage = 1;
        applyQueryView();
      });
      queryMonthInput.addEventListener("change", () => {
        currentPage = 1;
        applyQueryView();
      });
      prevPageBtn.addEventListener("click", () => {
        if (currentPage <= 1) return;
        currentPage -= 1;
        applyQueryView();
      });
      nextPageBtn.addEventListener("click", () => {
        const totalPages = Math.max(1, Math.ceil(queryRows.length / PAGE_SIZE));
        if (currentPage >= totalPages) return;
        currentPage += 1;
        applyQueryView();
      });
      sampleBtn.addEventListener("click", () => {
        rawInput.value = SAMPLE_TEXT;
        setStatus("已載入範例，請輸入 vender no. 後按解析資料。");
      });

      if (auth) {
        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          updateAuthUI();
        });
      } else {
        updateAuthUI();
      }

      resetInputs();
      setStatus("請先輸入 vender no. 與資料後再解析。");
      updateAuthDomainHint();
      
      // 根據保存的頁面狀態恢復
      const savedPage = localStorage.getItem("currentPage");
      if (savedPage === "query") {
        showQueryPage();
      } else {
        showParsePage();
      }
    </script>
  </body>
</html>
